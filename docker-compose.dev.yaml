services:
  postgres:
    ports:
      - "${PG_PORT:-5432}:5432"
  
  pgadmin:
    image: dpage/pgadmin4
    container_name: do-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@dustandorbit.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
        
  mongodb:
    ports:
      - "${MONGO_PORT:-27017}:27017"
  
  mongo_express:
    image: mongo-express
    container_name: do-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_LOGIN:-dust_user}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASS:-secret_password}
      ME_CONFIG_MONGODB_SERVER: mongodb
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  pg_data:
  mongo_data: