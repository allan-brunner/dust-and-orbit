version: 2
updates:
  # Maintain dependencies for npm
  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      
  # Maintain dependencies for Cargo
  - package-ecosystem: "cargo"
    directory: "/server"
    schedule:
      interval: "weekly"

  # Maintain dependencies for Cargo
  - package-ecosystem: "cargo"
    directory: "/shared_logic"
    schedule:
      interval: "weekly"

  # Maintain GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
